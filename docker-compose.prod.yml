version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api

  api:
    environment:
      DATABASE_URL: "postgresql://${PROD_DB_USER}:${PROD_DB_PASS}@meu-rds-producao.aws.com:5432/feedback_prod_db"
    restart: always