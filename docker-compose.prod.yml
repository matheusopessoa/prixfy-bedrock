services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api

  api:
    environment:
      NODE_ENV: prod
      DATABASE_URL: "postgresql://${PROD_DB_USER}:${PROD_DB_PASS}@meu-rds-producao.aws.com:5432/feedback_prod_db"
      EMAIL_BINDEX_SECRET: "${EMAIL_BINDEX_SECRET}"
      JWT_SIGN_SECRET: "${JWT_SIGN_SECRET}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS}"
    restart: always